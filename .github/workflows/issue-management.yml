name: Issue 自动化管理

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-label:
    name: 自动标记 Issue
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 根据内容添加标签
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            
            // 检查错误报告
            if (body.includes('bug') || body.includes('错误') || title.includes('bug')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['bug']
              });
            }
            
            // 检查功能请求
            if (body.includes('feature') || body.includes('功能') || body.includes('request')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['enhancement']
              });
            }
            
            // 检查硬件相关问题
            if (body.includes('camera') || body.includes('hardware') || 
                body.includes('相机') || body.includes('硬件')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['hardware']
              });
            }
            
            // 检查 GUI 相关问题
            if (body.includes('gui') || body.includes('界面') || body.includes('UI')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['gui']
              });
            }
