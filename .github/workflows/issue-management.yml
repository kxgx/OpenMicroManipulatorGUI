name: Issue Management

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-label:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Add labels based on issue content
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            
            // Check for bug reports
            if (body.includes('bug') || body.includes('错误') || title.includes('bug')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['bug']
              });
            }
            
            // Check for feature requests
            if (body.includes('feature') || body.includes('功能') || body.includes('request')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['enhancement']
              });
            }
            
            // Check for hardware-related issues
            if (body.includes('camera') || body.includes('hardware') || 
                body.includes('相机') || body.includes('硬件')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['hardware']
              });
            }
            
            // Check for GUI-related issues
            if (body.includes('gui') || body.includes('界面') || body.includes('UI')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['gui']
              });
            }
