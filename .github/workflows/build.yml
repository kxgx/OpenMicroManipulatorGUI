name: 多平台打包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  validate-tag:
    name: 验证 Tag 来源
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 验证 tag 指向 main 分支提交
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ 当前 tag (${GITHUB_REF_NAME}) 对应提交不在 main 分支上"
            exit 1
          fi
          echo "✅ Tag 来源校验通过"
      
      - name: 提取版本信息
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本：$VERSION"
  build-windows:
    name: 打包 Windows (x64)
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path source\requirements.txt) {
            pip install -r source\requirements.txt
          }
      
      - name: 打包 EXE
        run: |
          cd source
          pyinstaller --clean build.spec
      
      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Windows-x64
          path: source/dist/OpenMicroManipulator.exe
          if-no-files-found: ignore
  
  build-windows-x86:
    name: 打包 Windows (x86)
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python (x86)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x86'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path source\requirements.txt) {
            pip install -r source\requirements.txt
          }
      
      - name: 打包 EXE
        run: |
          cd source
          pyinstaller --clean build.spec
      
      - name: 上传 Windows x86 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Windows-x86
          path: source/dist/OpenMicroManipulator.exe
          if-no-files-found: ignore
  
  build-linux:
    name: 打包 Linux (x64)
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: 打包 AppImage
        run: |
          cd source
          pyinstaller --clean build.spec
          # 创建 AppImage 需要额外工具
          # 这里先打包为 tar.gz
      
      - name: 创建压缩包
        run: |
          cd source/dist
          tar -czvf OpenMicroManipulator-Linux-x64.tar.gz OpenMicroManipulator
      
      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Linux-x64
          path: source/dist/OpenMicroManipulator-Linux-x64.tar.gz
          if-no-files-found: ignore
  
  build-macos:
    name: 打包 macOS (Intel)
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: 打包 App
        run: |
          cd source
          pyinstaller --clean build.spec
      
      - name: 创建 DMG
        run: |
          cd source/dist
          hdiutil create -format UDZO -srcfolder OpenMicroManipulator.app OpenMicroManipulator-macOS-Intel.dmg
      
      - name: 上传 macOS Intel 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-macOS-Intel
          path: source/dist/OpenMicroManipulator-macOS-Intel.dmg
          if-no-files-found: ignore
  
  build-macos-arm:
    name: 打包 macOS (ARM/M1)
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python (ARM)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          arch -arm64 python3 -m pip install --upgrade pip
          arch -arm64 python3 -m pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            arch -arm64 python3 -m pip install -r source/requirements.txt
          fi
      
      - name: 打包 App
        run: |
          cd source
          arch -arm64 python3 -m PyInstaller --clean build.spec
      
      - name: 创建 DMG
        run: |
          cd source/dist
          hdiutil create -format UDZO -srcfolder OpenMicroManipulator.app OpenMicroManipulator-macOS-ARM.dmg
      
      - name: 上传 macOS ARM 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-macOS-ARM
          path: source/dist/OpenMicroManipulator-macOS-ARM.dmg
          if-no-files-found: ignore
  
  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-windows, build-windows-x86, build-linux, build-macos, build-macos-arm]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 列出构建产物
        run: |
          ls -R artifacts
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
          body: |
            ## 发布 OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
            
            自动构建的所有平台构建产物。
            
            ### 📦 下载
            - **Windows x64**: OpenMicroManipulator-Windows-x64.exe
            - **Windows x86**: OpenMicroManipulator-Windows-x86.exe
            - **Linux x64**: OpenMicroManipulator-Linux-x64.tar.gz
            - **macOS Intel**: OpenMicroManipulator-macOS-Intel.dmg
            - **macOS ARM**: OpenMicroManipulator-macOS-ARM.dmg
            
            ### 🔧 安装
            下载对应平台的文件并解压/运行。
            
            ### 📝 更新内容
            详见提交历史。
          files: |
            artifacts/**/OpenMicroManipulator*
          generate_release_notes: false
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  notify:
    name: 构建状态通知
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-windows-x86
      - build-linux
      - build-macos
      - build-macos-arm
    if: always()
    
    steps:
      - name: 检查构建状态
        run: |
          echo "## 构建总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 平台状态" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x86: ${{ needs.build-windows-x86.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x64: ${{ needs.build-linux.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS Intel: ${{ needs.build-macos.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM: ${{ needs.build-macos-arm.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "✅ 构建完成！构建产物可供下载。" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "🎉 Release 创建成功！" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ 构建产物可供测试" >> $GITHUB_STEP_SUMMARY
          fi
