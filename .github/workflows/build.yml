name: Windows x64 构建

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  validate-tag:
    name: 验证 Tag 来源并提取版本
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 验证 tag 指向 main 分支提交
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ 当前 tag (${GITHUB_REF_NAME}) 对应提交不在 main 分支上"
            exit 1
          fi
          echo "✅ Tag 来源校验通过"
      
      - name: 提取版本信息
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "❌ 无法从 tag 提取版本号：$TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本：$VERSION"
  
  build-windows:
    name: 打包 Windows (x64)
    runs-on: windows-latest
    needs: validate-tag
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
        
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path source\requirements.txt) {
            pip install -r source\requirements.txt
          }
        
      - name: 打包 EXE
        run: |
          cd source
          echo "=== 开始 PyInstaller 打包 ==="
          python --version
          pyinstaller --version
          echo "=== 执行 PyInstaller ==="
          pyinstaller --clean build.spec
          echo "=== 检查打包结果 ==="
          if (Test-Path "dist\OpenMicroManipulator.exe") {
            $filesize = [math]::Round((Get-Item "dist\OpenMicroManipulator.exe").Length / 1MB, 2)
            Write-Host "✅ EXE 打包成功，文件大小：$filesize MB"
          } else {
            Write-Host "❌ EXE 打包失败"
            Write-Host "当前目录内容:"
            Get-ChildItem dist | Format-Table
            exit 1
          }
        
      - name: 上传 Windows x64 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Windows-x64
          path: source\dist\OpenMicroManipulator.exe
          if-no-files-found: error
  
  create-release:
    name: 创建 Release
    runs-on: ubuntu-22.04
    needs:
      - validate-tag
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 列出构建产物
        run: |
          ls -R artifacts
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
          body: |
            ## 📦 OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
            
            自动构建的 Windows x64 平台发布版本。
            
            ### ✨ 主要特性
            - 🎯 微操作台运动控制
            - 📷 相机图像采集
            - 🔬 图像处理与对准
            - 💻 PySide6 GUI 界面
            
            ### 📥 安装说明
            1. 下载 `OpenMicroManipulator-Windows-x64.exe`
            2. 双击运行，无需安装 Python 环境
            3. 连接设备后即可使用
            
            ### 📝 更新内容
            详见提交历史。
            
            ### 🐛 问题反馈
            如有问题请提交 Issue。
          files: |
            artifacts/**/OpenMicroManipulator*.exe
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  notify:
    name: 构建状态通知
    runs-on: ubuntu-22.04
    needs:
      - build-windows
    if: always()
    
    steps:
      - name: 检查构建状态
        run: |
          echo "## 📊 构建总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ 平台状态" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🎉 手动触发构建完成！构建产物可供下载。" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "🚀 Release v${{ needs.validate-tag.outputs.version }} 创建成功！" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ 构建产物可供测试" >> $GITHUB_STEP_SUMMARY
          fi
