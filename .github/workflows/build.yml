name: Multi-Platform Build

on:
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发
    branches:
      - main
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  validate-tag:
    name: Validate Tag Source
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Verify tag points to main branch
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ Current tag (${GITHUB_REF_NAME}) is not based on main branch"
            exit 1
          fi
          echo "✅ Tag source validation passed"
      
      - name: Extract version info
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Release version: $VERSION"
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path source\requirements.txt) {
            pip install -r source\requirements.txt
          }
      
      - name: Build EXE
        run: |
          cd source
          pyinstaller --clean build.spec
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Windows-x64
          path: source/dist/OpenMicroManipulator.exe
          if-no-files-found: ignore
  
  build-windows-x86:
    name: Build Windows (x86)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python (x86)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x86'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path source\requirements.txt) {
            pip install -r source\requirements.txt
          }
      
      - name: Build EXE
        run: |
          cd source
          pyinstaller --clean build.spec
      
      - name: Upload Windows x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Windows-x86
          path: source/dist/OpenMicroManipulator.exe
          if-no-files-found: ignore
  
  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: Build AppImage
        run: |
          cd source
          pyinstaller --clean build.spec
          # 创建 AppImage 需要额外工具
          # 这里先打包为 tar.gz
      
      - name: Create tarball
        run: |
          cd source/dist
          tar -czvf OpenMicroManipulator-Linux-x64.tar.gz OpenMicroManipulator
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-Linux-x64
          path: source/dist/OpenMicroManipulator-Linux-x64.tar.gz
          if-no-files-found: ignore
  
  build-macos:
    name: Build macOS (Intel)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: Build App
        run: |
          cd source
          pyinstaller --clean build.spec
      
      - name: Create DMG
        run: |
          cd source/dist
          hdiutil create -format UDZO -srcfolder OpenMicroManipulator.app OpenMicroManipulator-macOS-Intel.dmg
      
      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-macOS-Intel
          path: source/dist/OpenMicroManipulator-macOS-Intel.dmg
          if-no-files-found: ignore
  
  build-macos-arm:
    name: Build macOS (ARM/M1)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python (ARM)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'
      
      - name: Install dependencies
        run: |
          arch -arm64 python3 -m pip install --upgrade pip
          arch -arm64 python3 -m pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            arch -arm64 python3 -m pip install -r source/requirements.txt
          fi
      
      - name: Build App
        run: |
          cd source
          arch -arm64 python3 -m PyInstaller --clean build.spec
      
      - name: Create DMG
        run: |
          cd source/dist
          hdiutil create -format UDZO -srcfolder OpenMicroManipulator.app OpenMicroManipulator-macOS-ARM.dmg
      
      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMicroManipulator-macOS-ARM
          path: source/dist/OpenMicroManipulator-macOS-ARM.dmg
          if-no-files-found: ignore
  
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-windows, build-windows-x86, build-linux, build-macos, build-macos-arm]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: |
          ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
          body: |
            ## Release OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
            
            Auto-built artifacts for all platforms.
            
            ### 📦 Downloads
            - **Windows x64**: OpenMicroManipulator-Windows-x64.exe
            - **Windows x86**: OpenMicroManipulator-Windows-x86.exe
            - **Linux x64**: OpenMicroManipulator-Linux-x64.tar.gz
            - **macOS Intel**: OpenMicroManipulator-macOS-Intel.dmg
            - **macOS ARM**: OpenMicroManipulator-macOS-ARM.dmg
            
            ### 🔧 Installation
            Download the appropriate file for your platform and extract/run.
            
            ### 📝 Changes
            See commit history for details.
          files: |
            artifacts/**/OpenMicroManipulator*
          generate_release_notes: false
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-windows, build-windows-x86, build-linux, build-macos, build-macos-arm]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platform Status" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x86: ${{ needs.build-windows-x86.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x64: ${{ needs.build-linux.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS Intel: ${{ needs.build-macos.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM: ${{ needs.build-macos-arm.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "✅ Build completed! Artifacts are available for download." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "🎉 Release created successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Build artifacts available for testing" >> $GITHUB_STEP_SUMMARY
          fi
