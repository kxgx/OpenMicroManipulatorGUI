name: Windows x64 构建

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  validate-tag:
    name: 验证 Tag 来源
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: 验证 tag 指向 main 分支提交
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ 当前 tag (${GITHUB_REF_NAME}) 对应提交不在 main 分支上"
            exit 1
          fi
          echo "✅ Tag 来源校验通过"
      
      - name: 提取版本信息
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本：$VERSION"
  
  build-windows:
    name: 打包 Windows (x64)
    runs-on: windows-latest
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        
      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
        
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path source\requirements.txt) {
            pip install -r source\requirements.txt
          }
        
      - name: 打包 EXE
        run: |
          cd source
          echo "=== 开始 PyInstaller 打包 ==="
          python --version
          pyinstaller --version
          echo "=== 执行 PyInstaller ==="
          pyinstaller --clean build.spec
          echo "=== 检查打包结果 ==="
          if (Test-Path "dist\OpenMicroManipulator.exe") {
            $filesize = [math]::Round((Get-Item "dist\OpenMicroManipulator.exe").Length / 1MB, 2)
            Write-Host "✅ EXE 打包成功，文件大小：$filesize MB"
          } else {
            Write-Host "❌ EXE 打包失败"
            Write-Host "当前目录内容:"
            Get-ChildItem dist | Format-Table
            exit 1
          }
        
      - name: 上传 Windows x64 构建产物
        uses: actions/upload-artifact@v5
        with:
          name: OpenMicroManipulator-Windows-x64
          path: source\dist\OpenMicroManipulator.exe
          if-no-files-found: ignore
  
  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v5
        with:
          path: artifacts
      
      - name: 列出构建产物
        run: |
          ls -R artifacts
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
          body: |
            ## 发布 OpenMicroManipulator v${{ needs.validate-tag.outputs.version }}
            
            Windows x64 自动构建产物。
            
            ### 📦 下载
            - **Windows x64**: OpenMicroManipulator-Windows-x64.exe
            
            ### 🔧 安装
            下载对应平台的文件并解压/运行。
            
            ### 📝 更新内容
            详见提交历史。
          files: |
            artifacts/**/OpenMicroManipulator*
          generate_release_notes: false
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  notify:
    name: 构建状态通知
    runs-on: ubuntu-latest
    needs:
      - build-windows
    if: always()
    
    steps:
      - name: 检查构建状态
        run: |
          echo "## 构建总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 平台状态" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "✅ 构建完成！构建产物可供下载。" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "🎉 Release 创建成功！" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ 构建产物可供测试" >> $GITHUB_STEP_SUMMARY
          fi
