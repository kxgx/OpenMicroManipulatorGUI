name: PR 代码质量检查

on:
  pull_request:
    branches: [ main ]

jobs:
  commit-message:
    name: 提交信息检查 (Commitlint)
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 运行 commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  changes:
    name: 变更检测
    runs-on: ubuntu-22.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'source/**/*.py'
              - 'source/requirements.txt'
            config:
              - '.github/workflows/**'
              - 'setup.cfg'
              - '.commitlintrc.json'
  lint:
    name: 代码风格检查 (Flake8)
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      
      - name: 运行 Flake8
        run: |
          # 如果有 Python 语法错误或未定义的变量，停止构建
          flake8 source --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Exit-zero 将所有错误视为警告（非阻塞）
          flake8 source --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
  
  type-check:
    name: 类型检查 (Mypy)
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          # 安装项目依赖以进行正确的类型检查
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: 运行 Mypy
        run: |
          mypy source/ --ignore-missing-imports --no-strict-optional || true
  
  security:
    name: 安全检查 (Bandit)
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      
      - name: 运行 Bandit
        run: |
          bandit -r source/ -ll -ii
  
  test:
    name: 运行测试
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: 运行测试（如有）
        run: |
          echo "暂未配置测试"
          # 添加测试后取消注释
          # pytest tests/ || true
  
  build:
    name: 打包验证
    runs-on: ubuntu-22.04
    needs: [changes, lint, type-check, security]
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: 使用 PyInstaller 打包
        run: |
          cd source
          pyinstaller --clean build.spec || true
  
  summary:
    name: PR 检查总结
    runs-on: ubuntu-22.04
    needs: [commit-message, lint, type-check, security, test, build]
    if: always()
    steps:
      - name: 检查任务状态
        run: |
          echo "## PR 检查总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 任务状态" >> $GITHUB_STEP_SUMMARY
          echo "- 提交信息：${{ needs.commit-message.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 代码风格：${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 类型检查：${{ needs.type-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 安全检查：${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 测试：${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 打包验证：${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.commit-message.result }}" == "failure" ] || [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.type-check.result }}" == "failure" ] || [ "${{ needs.security.result }}" == "failure" ]; then
            echo "❌ 部分检查未通过" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ 所有关键检查已通过" >> $GITHUB_STEP_SUMMARY
          fi
