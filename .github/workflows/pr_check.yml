name: PR Code Quality Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  commit-message:
    name: Commit Message Check (Commitlint)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  changes:
    name: Detect Changes
    runs-on: ubuntu-22.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'source/**/*.py'
              - 'source/requirements.txt'
            config:
              - '.github/workflows/**'
              - 'setup.cfg'
              - '.commitlintrc.json'
  lint:
    name: Code Linting (Flake8)
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      
      - name: Run Flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 source --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Exit-zero treats all errors as warnings (non-blocking)
          flake8 source --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
  
  type-check:
    name: Type Checking (Mypy)
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          # Install project dependencies for proper type checking
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: Run Mypy
        run: |
          mypy source/ --ignore-missing-imports --no-strict-optional || true
  
  security:
    name: Security Check (Bandit)
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      
      - name: Run Bandit
        run: |
          bandit -r source/ -ll -ii
  
  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: Run tests (if any)
        run: |
          echo "No tests configured yet"
          # Uncomment when tests are added
          # pytest tests/ || true
  
  build:
    name: Build Verification
    runs-on: ubuntu-22.04
    needs: [changes, lint, type-check, security]
    if: ${{ needs.changes.outputs.python == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f source/requirements.txt ]; then
            pip install -r source/requirements.txt
          fi
      
      - name: Build with PyInstaller
        run: |
          cd source
          pyinstaller --clean build.spec || true
  
  summary:
    name: PR Summary
    runs-on: ubuntu-22.04
    needs: [commit-message, lint, type-check, security, test, build]
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "## PR Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Commit Message: ${{ needs.commit-message.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type Check: ${{ needs.type-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.commit-message.result }}" == "failure" ] || [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.type-check.result }}" == "failure" ] || [ "${{ needs.security.result }}" == "failure" ]; then
            echo "❌ Some checks failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All critical checks passed" >> $GITHUB_STEP_SUMMARY
          fi
